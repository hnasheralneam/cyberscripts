---
- name: Install and Configure PTP on Linux VM
  hosts: vms
  vars_files:
    - secret
  become: true
  vars:
    ptp_config_file: "/etc/linuxptp/ptp4l.conf"
    # List of conflicting time services to disable
    time_services:
      - chronyd
      - ntp
      - systemd-timesyncd

  pre_tasks:
    - name: Detect primary network interface
      ansible.builtin.set_fact:
        ptp_interface: "{{ ansible_default_ipv4.interface }}"
      when: ansible_default_ipv4.interface is defined

    - name: Fail if interface cannot be found automatically
      ansible.builtin.fail:
        msg: "Could not detect a default interface"
      when: ptp_interface is not defined

    - name: Stop and disable conflicting time services
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop: "{{ time_services }}"
      ignore_errors: true

  tasks:
    - name: Install package
      ansible.builtin.package:
        name: linuxptp
        state: present

    - name: Ensure configuration directory exists
      ansible.builtin.file:
        path: "/etc/linuxptp"
        state: directory
        mode: '0755'

    - name: Configure ptp4l.conf
      ansible.builtin.copy:
        dest: "{{ ptp_config_file }}"
        content: |
          [global]
          # b/c hardware is not accesible in vms
          time_stamping        software
          domainNumber         0
          # prevents it from tryna start dishing out incorrect times
          clientOnly           1
          logging_level        6

          [{{ ptp_interface }}]
      notify: Restart ptp4l

      # 'Cause the debian package doesn't come with the service file
    - name: Create systemd service file (Debian only)
      ansible.builtin.copy:
        dest: /lib/systemd/system/ptp4l.service
        mode: '0644'
        content: |
          [Unit]
          Description=Precision Time Protocol (PTP) service
          After=network.target
          
          [Service]
          ExecStart=/usr/sbin/ptp4l -f /etc/linuxptp/ptp4l.conf
          Restart=always
          
          [Install]
          WantedBy=multi-user.target
      when: ansible_os_family == "Debian"
      notify: Restart ptp4l

    - name: Create systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ptp4l.service.d
        state: directory
        mode: '0755'

    - name: Create systemd override to bind interface
      ansible.builtin.copy:
        dest: /etc/systemd/system/ptp4l.service.d/override.conf
        content: |
          [Service]
          # Clear previous ExecStart
          ExecStart=
          # Start with config file and specific interface detected earlier
          ExecStart=/usr/sbin/ptp4l -f {{ ptp_config_file }} -i {{ ptp_interface }}
      notify: Restart ptp4l

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Ensure service is running and enabled
      ansible.builtin.service:
        name: ptp4l
        state: started
        enabled: yes

  handlers:
    - name: Restart ptp4l
      ansible.builtin.service:
        name: ptp4l
        state: restarted
